<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conversation Exporter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Conversation Exporter</h1>
      <p id="summary">Inspecting the current tab...</p>

      <label for="format">Format</label>
      <select id="format">
        <option value="markdown">Markdown (.md)</option>
        <option value="json">JSON (.json)</option>
        <option value="text">Plain text (.txt)</option>
      </select>

      <label class="check">
        <input id="loadAll" type="checkbox" checked>
        Load every virtualized message
      </label>

      <div class="actions">
        <button id="download" class="primary">Download</button>
        <button id="copy">Copy</button>
        <button id="console">Console</button>
      </div>

      <progress id="progress" max="1" value="0" hidden></progress>
      <p id="status" role="status">Open a conversation, then choose an action.</p>
      <button id="cancel" class="link" hidden>Cancel loading</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
